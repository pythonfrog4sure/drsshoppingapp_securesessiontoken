# Builds shopping-portal and deploys to GitHub Pages at /mosaictestportal/
# After the repo is renamed to mosaictestportal, the site URL will be:
#   https://<your-username>.github.io/mosaictestportal/
name: Deploy Mosaic Test Portal (shopping-portal)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-mosaictestportal
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shopping-portal for GitHub Pages
        env:
          VITE_BASE_PATH: /mosaictestportal/
        run: npm run build -w shopping-portal
      - uses: actions/upload-pages-artifact@v3
        with:
          path: shopping-portal/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
